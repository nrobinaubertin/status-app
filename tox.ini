[tox]
no_package = True
skip_missing_interpreters = True
env_list = format, lint, static, unit, coverage-report
min_version = 4.0.0

[vars]
charm_root = {tox_root}/charm/
charm_src = {[vars]charm_root}/src/
charm_tests = {[vars]charm_root}/tests/
app_src = {tox_root}/app.py
app_tests = {tox_root}/tests/

[testenv]
set_env =
    PY_COLORS=1
pass_env =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS
    STATUS_APP_CHARM_FILE
    STATUS_APP_ROCK_IMAGE
    STATUS_APP_BUILD_ARTIFACTS

[testenv:format]
description = Apply coding style standards to charm code
changedir = {[vars]charm_root}
deps =
    ruff
commands =
    ruff format {[vars]charm_src} {[vars]app_src}
    ruff check --fix {[vars]charm_src} {[vars]app_src}

[testenv:lint]
description = Check charm code against coding style standards
changedir = {[vars]charm_root}
deps =
    ruff
    codespell
commands =
    codespell {[vars]charm_root} {[vars]app_src}
    ruff check {[vars]charm_src} {[vars]app_src}
    ruff format --check --diff {[vars]charm_src} {[vars]app_src}

[testenv:static]
description = Run charm static type checks
changedir = {[vars]charm_root}
deps =
    pyright
    -r {[vars]charm_root}/requirements.txt
commands =
    pyright {posargs}

[testenv:integration]
description = Run charm integration tests
changedir = {[vars]charm_root}
deps =
    pytest
    juju
    jubilant
    pytest-operator
    -r {[vars]charm_root}/requirements.txt
commands =
    pytest -v \
           -s \
           --tb native \
           --log-cli-level=INFO \
           {posargs} \
           {[vars]charm_tests}/integration

[testenv:unit]
description = Run unit tests
set_env =
    PYTHONPATH = {tox_root}
deps =
    coverage[toml]
    pytest
    -r {tox_root}/requirements.txt
commands =
    coverage run --source=app \
        -m pytest -v --tb native -s {posargs} {[vars]app_tests}
    coverage report

[testenv:coverage-report]
description = Create test coverage report
deps =
    coverage[toml]
    pytest
    -r{toxinidir}/requirements.txt
commands =
    coverage report
